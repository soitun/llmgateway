name: seo-audit

on:
  schedule:
    # Monthly — 1st of the month 09:00 UTC, after the monthly traffic report.
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the report instead of posting to Discord"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Collect versions
        run: |
          echo "nodejs_version=$(cat .tool-versions | grep 'nodejs' | cut -d ' ' -f 2)" >> "$GITHUB_ENV"
          echo "pnpm_version=$(cat .tool-versions | grep 'pnpm' | cut -d ' ' -f 2)" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: ${{ env.pnpm_version }}

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: ${{ env.nodejs_version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run SEO & AI-SEO audit
        env:
          LLMGATEWAY_API_KEY: ${{ secrets.PR_MESSAGE_LLM_GATEWAY_API_KEY }}
          DISCORD_TRAFFIC_NOTIFICATION_URL: ${{ secrets.DISCORD_TRAFFIC_NOTIFICATION_URL }}
        run: pnpm --filter @llmgateway/scripts seo-audit-report ${{ inputs.dry_run == true && '--dry-run' || '' }}
